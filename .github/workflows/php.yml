name: PHP Lint

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: sqlite3, pdo_sqlite, mbstring

    - name: Validate PHP syntax
      run: |
        find . -name "*.php" -not -path "./vendor/*" -not -path "./scratch/*" -exec php -l {} \;
