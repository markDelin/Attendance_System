<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Attendance Recorder</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app">
  <header class="app-header">
    <div class="header-top">
      <i class="bi bi-clipboard-data header-icon"></i>
      <h1>Attendance</h1>
      <button id="btnSettings" class="btn-icon" onclick="toggleSettings()" title="Settings">
        <i class="bi bi-gear"></i>
      </button>
    </div>
    <div class="header-sub">
      <span id="appStatus" class="status-dot status-offline"></span>
      <span id="appStatusText">Disconnected</span>
    </div>
  </header>

  <div id="settingsPanel" class="settings-panel hidden">
    <div class="settings-content glass-card">
      <h3><i class="bi bi-key"></i> API Configuration</h3>
      <label>Server URL</label>
      <input type="url" id="serverUrl" class="input-glass" placeholder="https://your-server.com" autocomplete="off">
      <label>API Key (Bot Token)</label>
      <input type="password" id="apiKey" class="input-glass" placeholder="Telegram Bot Token" autocomplete="off">
      <div class="settings-actions">
        <button onclick="saveSettings()" class="btn btn-primary"><i class="bi bi-check-lg"></i> Save</button>
        <button onclick="toggleSettings()" class="btn btn-ghost">Cancel</button>
      </div>
    </div>
  </div>

  <main class="app-main">
    <div class="date-section">
      <label class="date-label"><i class="bi bi-calendar3"></i> Attendance Date</label>
      <input type="date" id="attendanceDate" class="date-input-glass">
    </div>

    <div class="stats-row glass-card" id="statsRow">
      <div class="stat-item">
        <span class="stat-value present" id="statPresent">0</span>
        <span class="stat-label">Present</span>
      </div>
      <div class="stat-item">
        <span class="stat-value late" id="statLate">0</span>
        <span class="stat-label">Late</span>
      </div>
      <div class="stat-item">
        <span class="stat-value absent" id="statAbsent">0</span>
        <span class="stat-label">Absent</span>
      </div>
      <div class="stat-item">
        <span class="stat-value remaining" id="statRemaining">0</span>
        <span class="stat-label">Remaining</span>
      </div>
    </div>

    <div class="search-section">
      <i class="bi bi-search search-icon"></i>
      <input type="text" id="searchInput" class="search-input-glass" placeholder="Search student..." autocomplete="off">
    </div>

    <div id="studentList" class="student-list">
      <div class="loading-state">
        <i class="bi bi-arrow-repeat spin"></i>
        <p>Loading students...</p>
      </div>
    </div>
  </main>

  <footer class="app-footer">
    <div class="footer-info" id="footerInfo">
      <span id="recordCount"><i class="bi bi-journal"></i> 0 records</span>
    </div>
    <button id="btnUpload" class="btn btn-primary btn-upload" onclick="uploadAttendance()" disabled>
      <i class="bi bi-cloud-upload"></i> <span>Upload</span>
    </button>
  </footer>

  <div id="toastContainer" class="toast-container"></div>
</div>

<script src="js/app.js"></script>
</body>
</html>
